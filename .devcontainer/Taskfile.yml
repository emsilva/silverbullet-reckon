version: '3'

tasks:
  rebuild:
    desc: Rebuild the dev container with the Dev Containers CLI
    preconditions:
      - sh: command -v devcontainer >/dev/null 2>&1
        msg: "Dev Containers CLI is not installed. Install with: npm i -g @devcontainers/cli"
    cmds:
      - devcontainer up --workspace-folder . --remove-existing-container --log-level trace
    silent: false
  upgrade:self:
    desc: Refresh the .devcontainer directory from the canonical repository
    dir: .devcontainer
    cmds:
      - bash -lc 'cd .. && curl -fsSL https://raw.githubusercontent.com/emsilva/devcontainer/main/install.sh | sh'
    silent: false

  upgrade:codex:
    desc: Download and install the latest Codex CLI without rebuilding the container
    dir: .devcontainer
    cmds:
      - ./scripts/upgrade-codex.sh
    silent: false

  upgrade:lock:
    desc: Refresh devcontainer-lock.json to the newest feature versions allowed by devcontainer.json (deliberate dependency bump — review the diff before committing/rebuilding)
    dir: .devcontainer
    cmds:
      - bash -lc 'cd .. && npx -y @devcontainers/cli@latest upgrade --workspace-folder .'
    silent: false

  setup:dotfiles:
    desc: "Apply a chezmoi dotfiles repo into $HOME (usage: task setup:dotfiles -- <repo>; omit to use $DOTFILES_REPO or be prompted)"
    dir: .devcontainer
    interactive: true
    cmds:
      - ./scripts/setup-dotfiles.sh {{.CLI_ARGS}}
    silent: false
