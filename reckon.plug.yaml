name: reckon
functions:
  reckonBlockWidget:
    path: ./src/plug.ts:reckonBlockWidget
    codeWidget: reckon

  onPageEvent:
    path: ./src/plug.ts:onPageEvent
    events:
      - editor:pageLoaded
      - editor:pageReloaded
      - editor:pageModified

  toggleSheetCommand:
    path: ./src/plug.ts:toggleSheetCommand
    command:
      name: "Reckon: Convert page to sheet"
      requireMode: rw
      requireEditor: page
